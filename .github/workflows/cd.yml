name: CD

# be 저장소 CD와 대칭 구조. 이 리포(sangsangseoga-python)만 바뀌어도 전체 스택을 재배포한다.
# 이 리포는 develop 없이 main에 직접 push하는 구조라, 검증 없이 push=즉시배포가 되지 않도록
# push를 직접 트리거로 쓰지 않고 CI(ci.yml)가 성공한 뒤에만 배포하도록 workflow_run으로 체이닝한다.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        # EC2_SSH_PRIVATE_KEY는 base64로 인코딩된 값이다(줄바꿈이 포함된 원본 PEM을
        # GitHub Secrets에 그대로 붙여넣으면 복사 과정에서 개행이 깨져 "error in
        # libcrypto"로 로드 실패하는 경우가 있어, 한 줄짜리 base64로 저장하고 여기서 디코딩한다).
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code on EC2 and redeploy
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd ~/sangsangseoga-python && git pull origin main
            # docker-compose.prod.yml은 be 저장소에 있으므로 빌드/재기동은 거기서 실행한다.
            cd ~/be && git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
          '
